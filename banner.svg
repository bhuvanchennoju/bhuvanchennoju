<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-30%" y="-200%" width="160%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="g" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.5" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="#0c0c0c"/>
  <rect width="1200" height="260" fill="url(#g)"/>

  <!-- Left amber accent bar -->
  <rect x="0" y="0" width="3" height="260" fill="url(#fade)"/>

  <!-- Name -->
  <text x="600" y="112"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-2">
    Bhuvan Chennoju
  </text>

  <!-- Amber rule with glow -->
  <rect x="430" y="128" width="340" height="1.5" fill="#f59e0b" rx="1" filter="url(#glow)"/>

  <!-- Subtitle -->
  <text x="600" y="160"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#f59e0b" letter-spacing="4">
    SENIOR DATA SCIENTIST · ML SYSTEMS &amp; AI
  </text>

  <!-- Affiliation + site -->
  <text x="600" y="188"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#484848" letter-spacing="2.5">
    T-Mobile USA · bhuvanchennoju.com
  </text>

  <!-- Bottom amber hairline -->
  <rect x="0" y="258" width="1200" height="1.5" fill="#f59e0b" opacity="0.18"/>
</svg>
